# .github/workflows/main.yml
name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_IrisClassifier }}
  REGION: ${{ secrets.GCP_IrisClassifier_REGION }}
  REPO: iris-repo
  SERVICE_NAME: iris-softmax-service
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_IrisClassifier }}/iris-repo/iris-softmax:${{ github.sha }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ app/ tests/ --max-line-length=88 --extend-ignore=E203,E501

      - name: Run tests
        run: |
          pytest -v

  build-and-push:
    name: Build & Push to Artifact Registry
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_IrisClassifier_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_IrisClassifier }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Ensure tuned model is used
        run: |
          # This ensures Docker uses your tuned model
          cp artifacts/tuned_model.pkl artifacts/model.pkl
          echo "✅ Using tuned model for deployment"

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_IrisClassifier_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_IrisClassifier }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=5 \
            --project=${{ env.PROJECT_ID }} \
            --set-env-vars=PROJECT_ID=${{ env.PROJECT_ID }},REGION=${{ env.REGION }},MODEL_PATH=/app/artifacts/model.pkl \
            --quiet

      - name: Get Service URL
        id: url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)" \
            --project=${{ env.PROJECT_ID }})
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "✅ Service deployed: $SERVICE_URL"

  test-deployment:
    name: Test Deployment
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Test API Endpoint
        run: |
          SERVICE_URL=${{ needs.deploy.outputs.service_url }}
          echo "Testing service: $SERVICE_URL"
          curl -X POST "$SERVICE_URL/predict" \
            -H "Content-Type: application/json" \
            -d '{"sepal_length": 5.1, "sepal_width": 3.5, "petal_length": 1.4, "petal_width": 0.2}' \
            --retry 3 --retry-delay 5
          echo "✅ API test passed"
